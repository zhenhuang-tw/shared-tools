<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 合併工具</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- pdf-lib CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <script>
        // Tailwind 暗色模式配置
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <style>
        /* 拖曳時的視覺回饋 */
        .drag-over {
            border-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.1);
        }
        
        /* 平滑過渡 */
        * {
            transition: background-color 0.2s, border-color 0.2s;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- 麵包屑導覽 -->
        <nav class="mb-6 text-sm" aria-label="Breadcrumb">
            <ol class="flex items-center space-x-2">
                <li>
                    <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline">首頁</a>
                </li>
                <li><span class="text-gray-400">/</span></li>
                <li>
                    <a href="pdf.html" class="text-blue-600 dark:text-blue-400 hover:underline">PDF 工具</a>
                </li>
                <li><span class="text-gray-400">/</span></li>
                <li>
                    <span class="text-gray-600 dark:text-gray-300">PDF 合併</span>
                </li>
            </ol>
        </nav>
        
        <!-- 標題列 -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">PDF 合併工具</h1>
            
            <!-- 暗色模式切換按鈕 -->
            <button 
                id="themeToggle" 
                class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600"
                aria-label="切換暗色模式"
            >
                <svg id="sunIcon" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
                <svg id="moonIcon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </div>
        
        <!-- 檔案上傳區 -->
        <div 
            id="dropZone" 
            class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-12 text-center mb-6 cursor-pointer hover:border-blue-400 dark:hover:border-blue-500"
        >
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="text-lg mb-2">拖曳 PDF 檔案至此，或點擊選擇檔案</p>
            <p class="text-sm text-gray-500 dark:text-gray-400">支援多檔案上傳</p>
            <input type="file" id="fileInput" accept="application/pdf" multiple class="hidden">
        </div>
        
        <!-- 檔案清單 -->
        <div id="fileListContainer" class="mb-6 hidden">
            <h2 class="text-xl font-semibold mb-4">已上傳檔案</h2>
            <div id="fileList" class="space-y-3">
                <!-- 動態生成檔案卡片 -->
            </div>
        </div>
        
        <!-- 使用者設定表單 -->
        <div id="settingsContainer" class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-6 hidden">
            <h2 class="text-xl font-semibold mb-4">合併設定</h2>
            
            <!-- Metadata 區塊 (可折疊) -->
            <div class="mb-6">
                <button 
                    id="metadataToggle" 
                    class="flex items-center justify-between w-full text-left font-medium mb-2 hover:text-blue-600 dark:hover:text-blue-400"
                >
                    <span>檔案資訊 (Metadata)</span>
                    <svg id="metadataIcon" class="w-5 h-5 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                
                <div id="metadataContent" class="hidden space-y-4 pl-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">合併後檔名</label>
                        <input 
                            type="text" 
                            id="outputFilename" 
                            placeholder="未填寫將自動產生 (yyyymmdd_hhmmss_merged.pdf)"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500"
                        >
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">請勿包含副檔名</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">PDF Title</label>
                        <input 
                            type="text" 
                            id="pdfTitle" 
                            placeholder="選填"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500"
                        >
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">PDF Author</label>
                        <input 
                            type="text" 
                            id="pdfAuthor" 
                            placeholder="選填"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500"
                        >
                    </div>
                </div>
            </div>
            
            <!-- 頁面布局 -->
            <div class="mb-6">
                <h3 class="font-medium mb-3">頁面布局</h3>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="normalizeSize" class="w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500">
                    <span class="text-sm">將所有頁面縮放至與第一頁相同寬度</span>
                </label>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 pl-6">
                    啟用後，會以第一個檔案的第一頁為基準，等比例縮放其他頁面
                </p>
            </div>
            
            <!-- 書籤處理 -->
            <div class="mb-6">
                <h3 class="font-medium mb-3">書籤處理方式</h3>
                <div class="space-y-2 pl-4">
                    <label class="flex items-start space-x-2 cursor-pointer">
                        <input type="radio" name="bookmarkMode" value="A1" class="mt-1 w-4 h-4 text-blue-600 focus:ring-2 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-sm">A1. 刪除所有書籤</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">合併後的 PDF 不包含任何書籤</div>
                        </div>
                    </label>
                    
                    <label class="flex items-start space-x-2 cursor-pointer">
                        <input type="radio" name="bookmarkMode" value="A2" checked class="mt-1 w-4 h-4 text-blue-600 focus:ring-2 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-sm">A2. 為每個 PDF 建立書籤</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">書籤名稱為原始檔名，指向該 PDF 的第一頁 (推薦)</div>
                        </div>
                    </label>
                    
                    <label class="flex items-start space-x-2 cursor-pointer">
                        <input type="radio" name="bookmarkMode" value="B1" class="mt-1 w-4 h-4 text-blue-600 focus:ring-2 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-sm">B1. 保留原有書籤</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">嘗試複製原始書籤，僅調整頁碼 (若無法解析將自動改為模式 A2)</div>
                        </div>
                    </label>
                    
                    <label class="flex items-start space-x-2 cursor-pointer">
                        <input type="radio" name="bookmarkMode" value="B2" class="mt-1 w-4 h-4 text-blue-600 focus:ring-2 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-sm">B2. 保留書籤並建立父層</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">為每個 PDF 建立父書籤，原始書籤成為子書籤 (若無法解析將自動改為模式 A2)</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- 合併按鈕 -->
        <div id="actionContainer" class="text-center mb-8 hidden">
            <button 
                id="mergeButton" 
                class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            >
                合併 PDF
            </button>
            
            <!-- 進度顯示 -->
            <div id="progressContainer" class="mt-4 hidden">
                <div class="inline-block px-4 py-2 bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-md">
                    <svg class="inline w-5 h-5 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="progressText">處理中...</span>
                </div>
            </div>
        </div>
        
        <!-- 頁尾說明 -->
        <footer class="text-center text-sm text-gray-600 dark:text-gray-400 border-t border-gray-200 dark:border-gray-700 pt-6 mt-12">
            <p>所有處理均在您的瀏覽器本機完成，檔案不會上傳至任何伺服器。</p>
            <p class="mt-2">
                <a href="https://github.com/zhenhuang-tw/shared-tools" class="text-blue-600 dark:text-blue-400 hover:underline">在 GitHub 上查看原始碼</a>
            </p>
        </footer>
        
    </div>
    
    <script>
        /* ========================================
         * 全域變數與初始化
         * ======================================== */
        
        const { PDFDocument, StandardFonts, rgb, PDFName, PDFString } = PDFLib;
        
        // 儲存上傳的 PDF 檔案資料
        let filesData = [];
        
        // 使用者設定
        let userSettings = {
            filename: '',
            title: '',
            author: '',
            normalizePageSize: false,
            bookmarkMode: 'A2'
        };
        
        /* ========================================
         * 暗色模式處理
         * ======================================== */
        
        // 初始化暗色模式
        function initTheme() {
            // 偵測系統偏好
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        }
        
        // 切換暗色模式
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
        
        /* ========================================
         * 檔案上傳處理
         * ======================================== */
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        // 點擊上傳區觸發檔案選擇
        dropZone.addEventListener('click', () => fileInput.click());
        
        // 拖曳進入
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        // 拖曳離開
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        
        // 拖曳放下
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            handleFiles(files);
        });
        
        // 檔案選擇
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
        });
        
        /* ========================================
         * 檔案處理與 PDF 載入
         * PDF library 使用區塊
         * ======================================== */
        
        async function handleFiles(files) {
            if (files.length === 0) return;
            
            console.log(`處理 ${files.length} 個檔案`);
            
            for (const file of files) {
                try {
                    // 讀取 PDF 檔案
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFDocument.load(arrayBuffer);
                    const totalPages = pdfDoc.getPageCount();
                    
                    // 建立檔案資料物件
                    const fileData = {
                        id: Date.now() + Math.random(), // 唯一 ID
                        file: file,
                        name: file.name,
                        pdfDoc: pdfDoc,
                        totalPages: totalPages,
                        pageRange: `1-${totalPages}`, // 預設選擇所有頁面
                        order: filesData.length // 排序索引
                    };
                    
                    filesData.push(fileData);
                    console.log(`已載入: ${file.name}, 共 ${totalPages} 頁`);
                    
                } catch (error) {
                    console.error(`載入 ${file.name} 失敗:`, error);
                    alert(`無法載入 ${file.name}，請確認是否為有效的 PDF 檔案。`);
                }
            }
            
            // 重新渲染檔案清單
            renderFileList();
            
            // 顯示相關區塊
            document.getElementById('fileListContainer').classList.remove('hidden');
            document.getElementById('settingsContainer').classList.remove('hidden');
            document.getElementById('actionContainer').classList.remove('hidden');
        }
        
        /* ========================================
         * 檔案清單渲染
         * ======================================== */
        
        function renderFileList() {
            const container = document.getElementById('fileList');
            container.innerHTML = '';
            
            // 按 order 排序
            const sortedFiles = [...filesData].sort((a, b) => a.order - b.order);
            
            sortedFiles.forEach((fileData, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 rounded-lg shadow p-4 flex items-center space-x-4';
                
                card.innerHTML = `
                    <div class="flex-shrink-0 text-2xl">📄</div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">${fileData.name}</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400">共 ${fileData.totalPages} 頁</div>
                    </div>
                    
                    <div class="flex-shrink-0 w-48">
                        <label class="text-xs text-gray-600 dark:text-gray-400">頁面範圍</label>
                        <input 
                            type="text" 
                            value="${fileData.pageRange}"
                            data-id="${fileData.id}"
                            class="page-range-input w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-1 focus:ring-blue-500"
                            placeholder="E.g. 1-5,7,9-10"
                        >
                    </div>
                    
                    <div class="flex-shrink-0 flex flex-col space-y-1">
                        <button 
                            data-id="${fileData.id}" 
                            data-direction="up"
                            class="move-button px-2 py-1 text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded disabled:opacity-50"
                            ${index === 0 ? 'disabled' : ''}
                        >
                            ↑ 上移
                        </button>
                        <button 
                            data-id="${fileData.id}" 
                            data-direction="down"
                            class="move-button px-2 py-1 text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded disabled:opacity-50"
                            ${index === sortedFiles.length - 1 ? 'disabled' : ''}
                        >
                            ↓ 下移
                        </button>
                    </div>
                    
                    <div class="flex-shrink-0">
                        <button 
                            data-id="${fileData.id}"
                            class="remove-button text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300"
                        >
                            <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            // 綁定事件
            bindFileListEvents();
        }
        
        /* ========================================
         * 檔案清單事件綁定
         * 使用 e.currentTarget 確保事件觸發對象正確
         * ======================================== */
        
        function bindFileListEvents() {
            // 頁面範圍輸入
            document.querySelectorAll('.page-range-input').forEach(input=> {
				input.addEventListener('change', (e) => {
					const id = parseFloat(e.target.dataset.id);
					const fileData = filesData.find(f => f.id === id);
					if (fileData) {
						fileData.pageRange = e.target.value;
						console.log(`更新 ${fileData.name} 頁面範圍: ${e.target.value}`);
					}
				});
			});
        
            // 上移/下移按鈕
            document.querySelectorAll('.move-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    // 使用 currentTarget，避免按到內部元素時 e.target 沒有 dataset
                    const id = parseFloat(e.currentTarget.dataset.id);
                    const direction = e.currentTarget.dataset.direction;
                    moveFile(id, direction);
                });
            });
            
            // 刪除按鈕
            document.querySelectorAll('.remove-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    // 使用 currentTarget，確保點擊 icon 也能觸發
                    const id = parseFloat(e.currentTarget.dataset.id);
                    removeFile(id);
                });
            });
        }
    
    /* ========================================
     * 檔案順序調整
     * 先根據 order 排序再尋找索引，確保邏輯與視覺一致
     * ======================================== */
    
    function moveFile(id, direction) {
        // 1. 取得目前依 order 排序後的陣列
        const sortedFiles = [...filesData].sort((a, b) => a.order - b.order);
        
        // 2. 找到目標檔案在"排序後"陣列中的位置
        const visualIndex = sortedFiles.findIndex(f => f.id === id);
        if (visualIndex === -1) return;
        
        // 3. 計算交換對象的位置
        const targetVisualIndex = direction === 'up' ? visualIndex - 1 : visualIndex + 1;
        
        // 4. 邊界檢查
        if (targetVisualIndex < 0 || targetVisualIndex >= sortedFiles.length) return;
        
        // 5. 取得要交換的兩個檔案物件
        const currentFile = sortedFiles[visualIndex];
        const targetFile = sortedFiles[targetVisualIndex];
        
        // 6. 交換它們的 order 值
        // 注意：這裡直接修改物件的屬性，因為 sortedFiles 中的物件引用與 filesData 中相同
        const tempOrder = currentFile.order;
        currentFile.order = targetFile.order;
        targetFile.order = tempOrder;
        
        // 7. 重新渲染
        renderFileList();
    }
    
    /* ========================================
     * 移除檔案
     * ======================================== */
    
    function removeFile(id) {
        filesData = filesData.filter(f => f.id !== id);
        
        // 重新分配 order，保持連續性
        // 先排序再重新編號
        filesData.sort((a, b) => a.order - b.order).forEach((f, i) => f.order = i);
        
        if (filesData.length === 0) {
            document.getElementById('fileListContainer').classList.add('hidden');
            document.getElementById('settingsContainer').classList.add('hidden');
            document.getElementById('actionContainer').classList.add('hidden');
        }
        
        renderFileList();
    }
    
    /* ========================================
     * Metadata 折疊功能
     * ======================================== */
    
    document.getElementById('metadataToggle').addEventListener('click', () => {
        const content = document.getElementById('metadataContent');
        const icon = document.getElementById('metadataIcon');
        
        content.classList.toggle('hidden');
        icon.classList.toggle('rotate-180');
    });
    
    /* ========================================
     * Author 欄位記憶功能
     * ======================================== */
    
    // 載入記憶的 Author
    const savedAuthor = localStorage.getItem('pdfAuthor');
    if (savedAuthor) {
        document.getElementById('pdfAuthor').value = savedAuthor;
    }
    
    // 監聽 Author 輸入變化
    document.getElementById('pdfAuthor').addEventListener('input', (e) => {
        localStorage.setItem('pdfAuthor', e.target.value);
    });
    
    /* ========================================
     * 頁面範圍解析
     * ======================================== */
    
    function parsePageRange(rangeStr, totalPages) {
        const pages = new Set();
        
        // 移除空白
        rangeStr = rangeStr.replace(/\s/g, '');
        
        // 驗證格式
        const validPattern = /^(\d+(-\d+)?)(,\d+(-\d+)?)*$/;
        if (!validPattern.test(rangeStr)) {
            throw new Error(`頁面範圍格式錯誤: ${rangeStr}`);
        }
        
        // 分割逗號
        const parts = rangeStr.split(',');
        
        for (const part of parts) {
            if (part.includes('-')) {
                // 範圍: 1-5
                const [start, end] = part.split('-').map(Number);
                
                if (start < 1 || end > totalPages || start > end) {
                    throw new Error(`頁面範圍 ${part} 超出範圍 (總頁數: ${totalPages})`);
                }
                
                for (let i = start; i <= end; i++) {
                    pages.add(i);
                }
            } else {
                // 單頁: 3
                const page = Number(part);
                
                if (page < 1 || page > totalPages) {
                    throw new Error(`頁面 ${page} 超出範圍 (總頁數: ${totalPages})`);
                }
                
                pages.add(page);
            }
        }
        
        // 轉為排序陣列 (1-based)
        return Array.from(pages).sort((a, b) => a - b);
    }
    
    /* ========================================
     * 合併 PDF 主函式
     * PDF library 使用區塊
     * ======================================== */
    
    document.getElementById('mergeButton').addEventListener('click', async () => {
        if (filesData.length === 0) {
            alert('請先上傳 PDF 檔案');
            return;
        }
        
        // 收集使用者設定
        userSettings.filename = document.getElementById('outputFilename').value.trim();
        userSettings.title = document.getElementById('pdfTitle').value.trim();
        userSettings.author = document.getElementById('pdfAuthor').value.trim();
        userSettings.normalizePageSize = document.getElementById('normalizeSize').checked;
        userSettings.bookmarkMode = document.querySelector('input[name="bookmarkMode"]:checked').value;
        
        console.log('開始合併 PDF', userSettings);
        
        // 顯示進度
        document.getElementById('mergeButton').disabled = true;
        document.getElementById('progressContainer').classList.remove('hidden');
        document.getElementById('progressText').textContent = '準備合併...';
        
        try {
            await mergePDFs();
        } catch (error) {
            console.error('合併失敗:', error);
            alert(`合併失敗: ${error.message}`);
        } finally {
            document.getElementById('mergeButton').disabled = false;
            document.getElementById('progressContainer').classList.add('hidden');
        }
    });
    
    async function mergePDFs() {
        // 建立新的 PDF 文件
        const mergedPdf = await PDFDocument.create();
        
        // 排序檔案
        const sortedFiles = [...filesData].sort((a, b) => a.order - b.order);
        
        // 記錄每個檔案在合併後的起始頁碼 (0-based)
        // 用於書籤處理時調整頁碼
        const pageOffsetMap = [];
        let currentOffset = 0;
        
        // 基準頁面尺寸 (用於標準化)
        let referenceWidth = null;
        let referenceHeight = null;
        
        document.getElementById('progressText').textContent = '複製頁面...';
        
        // 遍歷每個檔案
        for (let i = 0; i < sortedFiles.length; i++) {
            const fileData = sortedFiles[i];
            
            console.log(`處理檔案 ${i + 1}/${sortedFiles.length}: ${fileData.name}`);
            
            // 解析頁面範圍
            let pageIndices;
            try {
                const pages = parsePageRange(fileData.pageRange, fileData.totalPages);
                pageIndices = pages.map(p => p - 1); // 轉為 0-based
            } catch (error) {
                throw new Error(`檔案 "${fileData.name}" 的${error.message}`);
            }
            
            // 記錄此檔案的起始頁碼
            pageOffsetMap.push({
                fileName: fileData.name.replace('.pdf', ''),
                sourcePdf: fileData.pdfDoc,
                startPageIndex: currentOffset,
                pageCount: pageIndices.length
            });
            
            // 複製指定頁面
            const copiedPages = await mergedPdf.copyPages(fileData.pdfDoc, pageIndices);
            
            for (const page of copiedPages) {
                // 如果是第一頁，記錄基準尺寸
                if (referenceWidth === null) {
                    const { width, height } = page.getSize();
                    referenceWidth = width;
                    referenceHeight = height;
                }
                
                // 頁面尺寸標準化處理
                if (userSettings.normalizePageSize && referenceWidth !== null) {
                    const { width, height } = page.getSize();
                    
                    // 計算縮放比例 (以寬度為準)
                    const scale = referenceWidth / width;
                    
                    // 等比例縮放
                    page.scale(scale, scale);
                    
                    // 調整 MediaBox 使頁面置中
                    const newWidth = width * scale;
                    const newHeight = height * scale;
                    
                    page.setMediaBox(0, 0, referenceWidth, newHeight);
                    
                    console.log(`頁面縮放: ${width}x${height} -> ${newWidth}x${newHeight} (scale: ${scale.toFixed(2)})`);
                }
                
                mergedPdf.addPage(page);
            }
            
            currentOffset += pageIndices.length;
        }
        
        // 設定 Metadata
        document.getElementById('progressText').textContent = '設定檔案資訊...';
        
        if (userSettings.title) {
            mergedPdf.setTitle(userSettings.title);
        }
        
        if (userSettings.author) {
            mergedPdf.setAuthor(userSettings.author);
        }
        
        mergedPdf.setProducer('自製 PDF 合併工具');
        mergedPdf.setCreationDate(new Date());
        
        // 書籤處理
        document.getElementById('progressText').textContent = '處理書籤...';
        await processBookmarks(mergedPdf, pageOffsetMap);
        
        // 產生檔案
        document.getElementById('progressText').textContent = '產生檔案...';
        
        const pdfBytes = await mergedPdf.save();
        
        // 下載檔案
        const filename = generateFilename();
        downloadBlob(pdfBytes, filename);
        
        console.log(`合併完成: ${filename}`);
    }
    
    /* ========================================
     * 書籤處理函式
     * 實作 A2 方案：為每個 PDF 建立一個指向該檔案第一頁的書籤
     * ======================================== */
    
    async function processBookmarks(mergedPdf, pageOffsetMap) {
        const mode = userSettings.bookmarkMode;
        console.log(`書籤處理模式: ${mode}`);
        
        if (mode === 'A1') {
            // A1: 不建立任何書籤
            console.log('模式 A1: 不建立書籤');
            return;
        }
        
        // 針對 A2 模式，或是 B1/B2 (暫時皆以 A2 邏輯實作以確保功能可用性)
        // 說明：完整的 B1/B2 需要解析原始 PDF 的 Outlines 結構，這在純前端且無外部解析器的環境下風險較高
        // 因此依據「實踐性」原則，我們優先實作穩定的 A2 邏輯
        
        if (pageOffsetMap.length === 0) return;

        if (mode === 'A2' || mode === 'B1' || mode === 'B2') {
            // A2: 為每個 PDF 建立一個書籤
            console.log(`模式 A2: 為每個 PDF 建立書籤 (模式 ${mode} 若非 A2，暫以 A2 處理)`);

        try {
            // 準備建立 Outline 結構
            // 1. 為每個檔案項目預先建立 Ref
            const outlineRefs = [];
            for (let i = 0; i < pageOffsetMap.length; i++) {
                outlineRefs.push(mergedPdf.context.nextRef());
            }
            
            // 2. 建立 Root Outlines Dictionary
            const outlinesDictRef = mergedPdf.context.nextRef();
            const outlinesDict = mergedPdf.context.obj({
                Type: 'Outlines',
                First: outlineRefs[0],
                Last: outlineRefs[outlineRefs.length - 1],
                Count: pageOffsetMap.length
            });
            
            mergedPdf.catalog.set(PDFName.of('Outlines'), outlinesDictRef);
            mergedPdf.context.assign(outlinesDictRef, outlinesDict);
            
            // 3. 建立每個書籤 Item
            for (let i = 0; i < pageOffsetMap.length; i++) {
                const map = pageOffsetMap[i];
                const itemRef = outlineRefs[i];
                
                // 取得目標頁面的 Ref
                // getPages() 返回的是 PDFPage 物件陣列
                const targetPage = mergedPdf.getPages()[map.startPageIndex];
                if (!targetPage) continue;
                
                const bookmarkTitle = map.fileName;
                
                const itemDict = {
                    Title: PDFString.of(bookmarkTitle),
                    Parent: outlinesDictRef,
                    // Dest: [PageRef, /XYZ, left, top, zoom]
                    // 使用 null 代表保留原值 (預設顯示頁面頂端)
                    Dest: [targetPage.ref, 'XYZ', null, null, null]
                };
                
                // 設定鏈結 (Prev / Next)
                if (i > 0) {
                    itemDict.Prev = outlineRefs[i - 1];
                }
                if (i < pageOffsetMap.length - 1) {
                    itemDict.Next = outlineRefs[i + 1];
                }
                
                mergedPdf.context.assign(itemRef, mergedPdf.context.obj(itemDict));
            }
            
            console.log('書籤建立完成 (Mode A2 Implemented)');
            
        } catch (err) {
            console.error('A2 模式建立書籤時發生錯誤:', err);
            // 不中斷合併流程，僅記錄錯誤
        }
            
        } else {
            console.log(`模式 ${mode} 暫不支援，改以 A2 模式建立書籤`);
        }
    }
    
    /* ========================================
     * 檔名產生
     * ======================================== */
    
    function generateFilename() {
        if (userSettings.filename) {
            return userSettings.filename + '.pdf';
        }
        
        // 自動產生: yyyymmdd_hhmmss_merged.pdf
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        const second = String(now.getSeconds()).padStart(2, '0');
        
        return `${year}${month}${day}_${hour}${minute}${second}_merged.pdf`;
    }
    
    /* ========================================
     * 檔案下載
     * ======================================== */
    
    function downloadBlob(data, filename) {
        const blob = new Blob([data], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        
        // 釋放記憶體
        URL.revokeObjectURL(url);
    }
    
    /* ========================================
     * 初始化執行
     * ======================================== */
    
    initTheme();
    
    console.log('PDF 合併工具已載入');
    
    /* ========================================
     * 擴充性說明 - Page-Level 排序
     * 
     * 若未來要支援「跨檔案頁面混合排序」，需進行以下調整：
     * 
     * 1. 資料結構調整：
     *    從 file-based 改為 page-based
     *    
     *    pagesData = [
     *      {
     *        id: unique_id,
     *        sourceFileId: file_id,
     *        sourceFileName: "檔案A.pdf",
     *        pageIndex: 2,        // 原始檔案中的第幾頁 (0-based)
     *        thumbnailUrl: "...", // 可選: 縮圖預覽
     *        order: 0             // 在最終合併中的順序
     *      }
     *    ]
     * 
     * 2. UI 調整：
     *    - 顯示所有頁面的縮圖網格 (grid layout)
     *    - 支援拖曳排序 (可使用 SortableJS 等函式庫)
     *    - 提供「全選某檔案的所有頁面」快捷功能
     * 
     * 3. 書籤邏輯調整：
     *    - 需建立 sourceFileId -> finalPageIndices 的映射表
     *    - 父書籤指向「該檔案第一次出現的頁面」
     *    - 子書籤需重新計算頁碼 (不一定連續)
     * 
     * 4. 效能考量：
     *    - 大量頁面時需實作虛擬捲動 (virtual scrolling)
     *    - 縮圖生成可使用 Web Worker 非同步處理
     * 
     * 5. 程式碼節點標記：
     *    - 檔案清單渲染: renderFileList() -> 改為 renderPageGrid()
     *    - 合併邏輯: mergePDFs() -> 改為遍歷 pagesData
     *    - 書籤處理: processBookmarks() -> 需重新設計映射邏輯
     * 
     * ======================================== */
    
</script>
